name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'Assets/Scripts/**/*.cs'

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install openai pyyaml

      - name: Get Changed Files
        id: changes
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD -- '*.cs' | head -20)
          COUNT=$(echo "$FILES" | grep -c '.' || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Run AI Review
        if: steps.changes.outputs.count != '0'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          python scripts/ci_review.py \
            --base origin/${{ github.base_ref }} \
            --output review_result.md

      - name: Post Review Comment
        if: steps.changes.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_result.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **AI Code Review**\n\n' + body
            });